<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<main class="h-screen flex items-center justify-center">

    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
            Reset Password
        </h2>

        <form method="POST" action="{{ url_for('user.reset_password', id=user.id) }}" class="space-y-4">

            <!-- Password -->
            <div>
                <label class="block font-medium mb-1">New Password</label>

                <div class="relative">
                    <input
                            type="password"
                            name="password"
                            id="password"
                            required
                            autocomplete="new-password"
                            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >

                    <button
                            type="button"
                            onclick="togglePassword('password')"
                            class="absolute right-3 top-2 text-gray-500"
                    >
                        👁️
                    </button>
                </div>

                <p id="passwordError" class="text-red-500 text-sm"></p>
            </div>


            <!-- Confirm Password -->
            <div>
                <label class="block font-medium mb-1">Confirm Password</label>

                <div class="relative">
                    <input
                            type="password"
                            name="confirm_password"
                            id="confirm_password"
                            required
                            autocomplete="new-password"
                            class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >

                    <button
                            type="button"
                            onclick="togglePassword('confirm_password')"
                            class="absolute right-3 top-2 text-gray-500"
                    >
                        👁️
                    </button>
                </div>

                <p id="confirmError" class="text-red-500 text-sm"></p>
            </div>


            <!-- Submit -->
            <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded font-medium"
            >
                Reset Password
            </button>

        </form>

    </div>

</main>


<script>

    const password = document.getElementById("password")
    const confirmPassword = document.getElementById("confirm_password")

    const passwordError = document.getElementById("passwordError")
    const confirmError = document.getElementById("confirmError")

    /* PASSWORD STRENGTH */

    password.addEventListener("input", function(){

    const strong=/^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/

    if(!strong.test(password.value)){
    passwordError.textContent="Password must contain uppercase, lowercase, number, special character and be at least 8 characters."
    }else{
    passwordError.textContent=""
    }

    })


    /* PASSWORD MATCH */

    confirmPassword.addEventListener("input", function(){

    if(confirmPassword.value !== password.value){
    confirmError.textContent="Passwords do not match"
    }else{
    confirmError.textContent=""
    }

    })


    /* SHOW / HIDE PASSWORD */

    function togglePassword(id){

    const field = document.getElementById(id)

    if(field.type === "password"){
    field.type = "text"
    }else{
    field.type = "password"
    }

    }

</script>

</body>
</html>
