{% extends "main/index.html" %}
{% block main %}
<main class="container mx-auto py-10 px-6">
    <!-- Header Section -->
    <div class="flex items-center justify-between mb-8 border-b border-gray-100 pb-5">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Active Tasks</h1>
        <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
            {{ tasks|length }} Total
        </span>
    </div>

    <!-- Responsive Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        {% for x in tasks %}
        <div class="group relative bg-white border border-slate-200 rounded-xl p-5 shadow-sm transition-all duration-200 hover:shadow-md hover:border-blue-400 hover:-translate-y-1">

            <!-- Status/Tag (Optional placeholder) -->
            <div class="flex items-center justify-between mb-4">
                <div class="h-2 w-2 rounded-full bg-blue-500"></div>
                <button class="text-slate-300 group-hover:text-slate-500">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path>
                    </svg>
                </button>
            </div>

            <!-- Task Title -->
            <h2 class="text-base font-semibold text-slate-700 group-hover:text-blue-600 transition-colors line-clamp-2">
                {{ x.title }}
            </h2>
            <div>
                {% for user in x.users %}
                {{ user.username }}
                {% endfor %}
            </div>

            <!-- Metadata/Footer -->
            <div class="mt-6 pt-4 border-t border-slate-50 flex items-center justify-between">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Task ID: {{ x.id }}</span>

                <!-- Action Link (Makes whole card clickable) -->
                <a href="#" class="absolute inset-0 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></a>
            </div>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock main %}
